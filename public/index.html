<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>NLRPLS Monitoring</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html,
    body {
      height: 100vh;
      overflow: hidden;
      background: #0b0d10;
    }

    .col-scroll::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>

<body class="text-gray-200 font-sans">

  <div class="h-screen w-screen flex flex-col px-6 py-4 box-border">

    <div class="flex items-baseline justify-between mb-3 flex-shrink-0">
      <h1 class="text-lg font-semibold tracking-wide text-gray-300 uppercase">Do you know the status your equipment is?
      </h1>
      <span id="updated" class="text-xs text-gray-500"></span>
    </div>

    <div id="board" class="grid grid-cols-6 gap-4 flex-1 min-h-0">
    </div>

  </div>

  <script>
    const COLUMN_ORDER = ['Servers', 'Services', 'Network Appliances', 'Printers', ['Websites', 'Databases'], 'Library Applications'];
    const BRANCHED_COLS = new Set(['Servers', 'Services', 'Network Appliances', 'Printers']);
    const COLUMN_BRANCHES = {
      'Servers': ['Argenta', 'Laman'],
      'Services': ['Argenta', 'Laman'],
      'Network Appliances': ['Argenta', 'Laman'],
      'Printers': ['Argenta', 'Laman'],
    };
    const BRANCHES = ['Argenta', 'Laman'];  // fallback
    const SLOTS_PER_COLUMN = 30;  // for single columns
    const SLOTS_PER_SECTION = 15;  // per branch half-column
    const FALLBACK_COLOR = '#4b5563';

    // Monitors whose name matches one of these are rendered with the
    // fleet-style health bar (X/Y overlay, percentage-based color) instead
    // of the normal status dot + heartbeat tick row.
    const FLEET_MONITOR_NAMES = ['Vipre Endpoint Fleet'];

    // Monitors whose name matches one of these are rendered with an
    // "unhealthy / total" count bar instead of the normal tick row.
    const UNHEALTHY_FLEET_MONITOR_NAMES = ['Vipre Endpoint Security'];

    function tickColor(status) {
      if (status === 1) return 'bg-green-500';
      if (status === 0) return 'bg-red-500';
      if (status === 2) return 'bg-yellow-500';
      if (status === 3) return 'bg-blue-500';
      return 'bg-gray-600';
    }

    function statusDot(status) {
      if (status === 1) return 'bg-green-500 shadow-[0_0_5px_rgba(34,197,94,0.8)]';
      if (status === 0) return 'bg-red-500 shadow-[0_0_5px_rgba(239,68,68,0.8)]';
      if (status === 2) return 'bg-yellow-500';
      if (status === 3) return 'bg-blue-500';
      return 'bg-gray-600';
    }

    // Returns a Tailwind text color based on days remaining vs the warn threshold
    function expiryColor(days, warnDays) {
      if (days === null || days === undefined) return 'text-gray-500';
      if (days <= 0) return 'text-red-400';
      if (days <= warnDays) return 'text-yellow-400';
      return 'text-green-400';
    }

    // Parses counts out of messages like "3 of 166 devices unhealthy" or
    // "All 166 devices healthy". Returns { healthy, total } or null if the
    // message doesn't match either pattern.
    function parseFleetCounts(msg) {
      if (!msg) return null;

      let m = msg.match(/(\d+)\s+of\s+(\d+)/i);
      if (m) {
        const unhealthy = parseInt(m[1], 10);
        const total = parseInt(m[2], 10);
        return { healthy: total - unhealthy, total };
      }

      m = msg.match(/All\s+(\d+)/i);
      if (m) {
        const total = parseInt(m[1], 10);
        return { healthy: total, total };
      }

      return null;
    }

    // 100% -> green, 75-99% -> yellow, below 75% -> red
    function fleetBarColor(pct) {
      if (pct >= 100) return 'bg-green-500';
      if (pct >= 75) return 'bg-yellow-500';
      return 'bg-red-500';
    }

    function buildTickBar(recentBeats) {
      const beats = (recentBeats && recentBeats.length > 0) ? recentBeats : [null];
      const bar = document.createElement('div');
      bar.className = 'flex gap-px';
      beats.forEach(s => {
        const tick = document.createElement('span');
        tick.className = 'flex-1 h-1 rounded-sm ' + tickColor(s);
        bar.appendChild(tick);
      });
      return bar;
    }

    // Builds an expanded domain pill with structured Online / SSL / Domain detail rows
    function buildDomainPill(m, domainInfo, thresholds) {
      const pill = document.createElement('div');
      pill.className = 'flex flex-col bg-[#181c23] rounded px-2 py-1.5 gap-1';

      const isRegOnly = domainInfo.type === 'reg-only';

      // Top row: status dot + domain name + optional "parked" badge
      const topRow = document.createElement('div');
      topRow.className = 'flex items-center gap-1.5';
      topRow.innerHTML =
        '<span class="w-2 h-2 rounded-full flex-shrink-0 ' + statusDot(m.status) + '"></span>' +
        '<span class="text-[11px] leading-none truncate">' + m.name + '</span>' +
        (isRegOnly ? '<span class="ml-auto text-[9px] text-gray-600 flex-shrink-0 italic">parked</span>' : '');
      pill.appendChild(topRow);

      // Heartbeat tick bar — only for full domains (parked domains have no ping/online check)
      if (!isRegOnly) {
        pill.appendChild(buildTickBar(m.recentBeats));
      }

      // Detail rows beneath a subtle divider
      const details = document.createElement('div');
      details.className = 'border-t border-gray-700/50 pt-1 mt-0.5 flex flex-col gap-0.5';

      function detailRow(label, valueHtml) {
        const row = document.createElement('div');
        row.className = 'flex items-center gap-1 text-[10px]';
        row.innerHTML = '<span class="text-gray-600 w-11 flex-shrink-0">' + label + '</span>' + valueHtml;
        return row;
      }

      if (!isRegOnly) {
        // Online status row
        const ol = domainInfo.online;
        if (ol && ol.online) {
          details.appendChild(detailRow('Online',
            '<span class="text-green-400">' + ol.protocol.toUpperCase() + ' ' + ol.statusCode + '</span>' +
            '<span class="text-gray-600 ml-auto">' + ol.responseTimeMs + 'ms</span>'
          ));
        } else {
          details.appendChild(detailRow('Online',
            '<span class="text-red-400">' + ((ol && ol.error) ? ol.error : 'Unreachable') + '</span>'
          ));
        }

        // SSL certificate row
        const ssl = domainInfo.ssl;
        if (!ssl || ssl.error) {
          details.appendChild(detailRow('SSL',
            '<span class="text-gray-600">N/A</span>'
          ));
        } else {
          const sslColor = expiryColor(ssl.daysUntilExpiry, thresholds.ssl);
          const sslText = ssl.daysUntilExpiry <= 0
            ? 'Expired ' + Math.abs(ssl.daysUntilExpiry) + 'd ago'
            : ssl.daysUntilExpiry + 'd';
          details.appendChild(detailRow('SSL',
            '<span class="' + sslColor + '">' + sslText + '</span>' +
            (ssl.issuer ? '<span class="text-gray-600 ml-auto truncate max-w-[80px]">' + ssl.issuer + '</span>' : '')
          ));
        }
      }

      // Domain registration expiry row
      const reg = domainInfo.registration;
      if (!reg || reg.error) {
        details.appendChild(detailRow('Domain',
          '<span class="text-gray-600">RDAP ERR</span>'
        ));
      } else {
        const regColor = expiryColor(reg.daysUntilExpiry, thresholds.domain);
        const regText = reg.daysUntilExpiry === null
          ? '—'
          : reg.daysUntilExpiry <= 0
            ? 'Expired ' + Math.abs(reg.daysUntilExpiry) + 'd ago'
            : reg.daysUntilExpiry + 'd';
        details.appendChild(detailRow('Domain',
          '<span class="' + regColor + '">' + regText + '</span>' +
          (reg.registrar ? '<span class="text-gray-600 ml-auto truncate max-w-[80px]">' + reg.registrar + '</span>' : '')
        ));
      }

      pill.appendChild(details);
      return pill;
    }

    // Look up domain data by monitor name.
    // First tries an exact key match (monitor named exactly "nlrlibrary.org"),
    // then falls back to checking if any domain key appears inside the monitor name.
    function findDomainInfo(monitorName, domainData) {
      if (!domainData || !domainData.domains) return null;
      if (domainData.domains[monitorName]) return domainData.domains[monitorName];
      const nameLower = monitorName.toLowerCase();
      const entry = Object.entries(domainData.domains).find(([domain]) =>
        nameLower.includes(domain.toLowerCase())
      );
      return entry ? entry[1] : null;
    }

    function buildMonitorList(monitors, limit, domainData) {
      const list = document.createElement('div');
      list.className = 'col-scroll flex-1 overflow-y-auto px-1.5 py-1.5 flex flex-col gap-1';

      if (monitors.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'text-[11px] text-gray-600 italic px-1.5 py-1';
        empty.textContent = 'No monitors tagged';
        list.appendChild(empty);
      } else {
        monitors.slice(0, limit).forEach(m => {
          // Domain monitors get an expanded pill with structured detail rows
          const domainInfo = findDomainInfo(m.name, domainData);
          if (domainInfo) {
            list.appendChild(buildDomainPill(m, domainInfo, domainData.thresholds));
            return;
          }

          const pill = document.createElement('div');
          pill.className = 'flex flex-col bg-[#181c23] rounded px-2 py-1.5 gap-1';

          const topRow = document.createElement('div');
          topRow.className = 'flex items-center gap-1.5';

          const isFleet = FLEET_MONITOR_NAMES.includes(m.name);
          const isUnhealthyFleet = UNHEALTHY_FLEET_MONITOR_NAMES.includes(m.name);
          const fleetCounts = isFleet ? parseFleetCounts(m.msg) : null;
          const unhealthyCounts = isUnhealthyFleet ? parseFleetCounts(m.msg) : null;

          if (isUnhealthyFleet) {
            const unhealthy = unhealthyCounts ? (unhealthyCounts.total - unhealthyCounts.healthy) : null;
            let color = 'bg-gray-600';
            if (unhealthyCounts) {
              const pct = unhealthyCounts.total > 0 ? (unhealthy / unhealthyCounts.total) * 100 : 0;
              color = pct < 25 ? 'bg-green-500' : pct < 50 ? 'bg-yellow-500' : 'bg-red-500';
            }

            topRow.innerHTML =
              '<span class="w-2 h-2 rounded-full flex-shrink-0 ' + color + '"></span>' +
              '<span class="text-[11px] leading-none truncate">' + m.name + '</span>';

            const fleetBar = document.createElement('div');
            fleetBar.className = 'relative h-4 rounded-sm overflow-hidden ' + color + ' flex items-center justify-center';
            fleetBar.innerHTML =
              '<span class="text-[10px] font-semibold text-black/80 leading-none">' +
              (unhealthyCounts ? unhealthy + '/' + unhealthyCounts.healthy : (m.msg || 'No heartbeat')) + '</span>';

            pill.appendChild(topRow);
            pill.appendChild(fleetBar);
          } else if (isFleet) {
            const pct = fleetCounts && fleetCounts.total > 0 ? (fleetCounts.healthy / fleetCounts.total) * 100 : 0;
            const color = fleetCounts ? fleetBarColor(pct) : 'bg-gray-600';

            topRow.innerHTML =
              '<span class="w-2 h-2 rounded-full flex-shrink-0 ' + color + '"></span>' +
              '<span class="text-[11px] leading-none truncate">' + m.name + '</span>';

            const fleetBar = document.createElement('div');
            fleetBar.className = 'relative h-4 rounded-sm overflow-hidden ' + color + ' flex items-center justify-center';
            fleetBar.innerHTML =
              '<span class="text-[10px] font-semibold text-black/80 leading-none">' +
              (fleetCounts ? fleetCounts.healthy + '/' + fleetCounts.total : (m.msg || 'No heartbeat')) + '</span>';

            pill.appendChild(topRow);
            pill.appendChild(fleetBar);
          } else {
            topRow.innerHTML =
              '<span class="w-2 h-2 rounded-full flex-shrink-0 ' + statusDot(m.status) + '"></span>' +
              '<span class="text-[11px] leading-none truncate">' + m.name + '</span>';

            const beats = (m.recentBeats && m.recentBeats.length > 0) ? m.recentBeats : [null];
            const bar = document.createElement('div');
            bar.className = 'flex gap-px';
            beats.forEach(s => {
              const tick = document.createElement('span');
              tick.className = 'flex-1 h-1 rounded-sm ' + tickColor(s);
              bar.appendChild(tick);
            });

            pill.appendChild(topRow);
            pill.appendChild(bar);
          }

          list.appendChild(pill);
        });

        if (monitors.length > limit) {
          const overflow = document.createElement('div');
          overflow.className = 'text-[10px] text-gray-600 italic px-1.5 pt-0.5';
          overflow.textContent = '+' + (monitors.length - limit) + ' more';
          list.appendChild(overflow);
        }
      }

      return list;
    }

    async function load() {
      try {
        const [statusRes, domainRes] = await Promise.all([
          fetch('/api/status'),
          fetch('/api/domains').catch(() => null),
        ]);
        const data = await statusRes.json();
        const domainData = domainRes ? await domainRes.json().catch(() => null) : null;

        if (!data.socketConnected) {
          document.getElementById('board').innerHTML =
            '<div class="col-span-6 text-center text-yellow-500 text-sm">Waiting on Uptime Kuma login (Socket.IO not connected yet)...</div>';
        } else {
          render(data.columns, domainData);
        }
      } catch (e) {
        document.getElementById('board').innerHTML =
          '<div class="col-span-6 text-center text-gray-500 text-sm">Could not reach viewer backend.</div>';
      }
      document.getElementById('updated').textContent =
        'Updated ' + new Date().toLocaleTimeString();
    }

    function render(columns, domainData) {
      const board = document.getElementById('board');
      board.innerHTML = '';

      COLUMN_ORDER.forEach(entry => {
        // Paired half-columns: render two stacked in one grid cell
        if (Array.isArray(entry)) {
          const wrapper = document.createElement('div');
          wrapper.className = 'flex flex-col min-h-0 gap-4';

          entry.forEach(colName => {
            const colData = columns && columns[colName];
            if (!colData) return;
            const color = colData.color || FALLBACK_COLOR;
            const monitors = colData.monitors || [];

            const col = document.createElement('div');
            col.className = 'flex flex-col min-h-0 flex-1 bg-[#11141a] border border-gray-800 rounded-md overflow-hidden';
            col.style.borderTopColor = color;
            col.style.borderTopWidth = '3px';

            const header = document.createElement('div');
            header.className = 'px-2.5 py-1.5 text-[11px] font-semibold uppercase tracking-wider border-b border-gray-800 bg-[#0e1116] flex-shrink-0 truncate flex items-center gap-1.5';
            header.innerHTML =
              '<span class="w-2 h-2 rounded-full flex-shrink-0" style="background:' + color + '"></span>' +
              '<span style="color:' + color + '">' + colName + '</span>' +
              '<span class="text-gray-500 font-normal">(' + monitors.length + ')</span>';

            col.appendChild(header);
            col.appendChild(buildMonitorList(monitors, SLOTS_PER_COLUMN, domainData));
            wrapper.appendChild(col);
          });

          board.appendChild(wrapper);
          return;
        }

        const colName = entry;
        const colData = columns && columns[colName];
        if (!colData) return;
        const color = colData.color || FALLBACK_COLOR;

        const col = document.createElement('div');
        col.className = 'flex flex-col min-h-0 bg-[#11141a] border border-gray-800 rounded-md overflow-hidden';
        col.style.borderTopColor = color;
        col.style.borderTopWidth = '3px';

        if (colData.split) {
          const branches = COLUMN_BRANCHES[colName] || BRANCHES;
          let sectionIdx = 0;
          branches.forEach((branch, idx) => {
            const monitors = (colData.branches && colData.branches[branch]) || [];

            const section = document.createElement('div');
            section.className = 'flex flex-col min-h-0' + (idx === 0 ? ' border-b border-gray-700' : '');
            section.style.flexGrow = Math.max(1, monitors.length);

            const header = document.createElement('div');
            header.className = 'px-2.5 py-1.5 text-[11px] font-semibold uppercase tracking-wider border-b border-gray-800 bg-[#0e1116] flex-shrink-0 flex items-center gap-1.5';
            header.innerHTML =
              '<span class="w-2 h-2 rounded-full flex-shrink-0" style="background:' + color + '"></span>' +
              '<span style="color:' + color + '">' + colName + '</span>' +
              '<span class="text-gray-500 font-normal text-[10px]">/ ' + branch + '</span>' +
              '<span class="text-gray-500 font-normal ml-auto">(' + monitors.length + ')</span>';

            section.appendChild(header);
            section.appendChild(buildMonitorList(monitors, SLOTS_PER_SECTION, domainData));
            col.appendChild(section);
            sectionIdx++;
          });

          // Render extra tag-based sections (e.g. Databases in Services)
          const extraSections = colData.extraSections || {};
          Object.keys(extraSections).forEach((sectionName) => {
            const monitors = extraSections[sectionName] || [];
            const section = document.createElement('div');
            section.className = 'flex flex-col min-h-0 border-t border-gray-700';
            section.style.flexGrow = Math.max(1, monitors.length);

            const header = document.createElement('div');
            header.className = 'px-2.5 py-1.5 text-[11px] font-semibold uppercase tracking-wider border-b border-gray-800 bg-[#0e1116] flex-shrink-0 flex items-center gap-1.5';
            header.innerHTML =
              '<span class="w-2 h-2 rounded-full flex-shrink-0" style="background:' + color + '"></span>' +
              '<span style="color:' + color + '">' + sectionName + '</span>' +
              '<span class="text-gray-500 font-normal ml-auto">(' + monitors.length + ')</span>';

            section.appendChild(header);
            section.appendChild(buildMonitorList(monitors, SLOTS_PER_SECTION, domainData));
            col.appendChild(section);
          });
        } else {
          const monitors = colData.monitors || [];

          const header = document.createElement('div');
          header.className = 'px-2.5 py-1.5 text-[11px] font-semibold uppercase tracking-wider border-b border-gray-800 bg-[#0e1116] flex-shrink-0 truncate flex items-center gap-1.5';
          header.innerHTML =
            '<span class="w-2 h-2 rounded-full flex-shrink-0" style="background:' + color + '"></span>' +
            '<span style="color:' + color + '">' + colName + '</span>' +
            '<span class="text-gray-500 font-normal">(' + monitors.length + ')</span>';

          col.appendChild(header);
          col.appendChild(buildMonitorList(monitors, SLOTS_PER_COLUMN, domainData));
        }

        board.appendChild(col);
      });
    }

    load();
    setInterval(load, 30000);
  </script>
</body>

</html>
